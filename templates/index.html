<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Student Performance Predictor</h1>

    <form method="POST">

        <input type="number" name="attendance" placeholder="Attendance %" required>

        <input type="number" name="study" placeholder="Study Hours" required>

        <input type="number" name="assignment" placeholder="Assignment Score" required>

        <input type="number" name="internal" placeholder="Internal Marks" required>

        <button type="submit">Predict Score</button>

    </form>

    {% if prediction %}
    <div class="result">
        Predicted Final Score: {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
